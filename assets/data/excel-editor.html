<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>XLSX Editor – Dark ComfyUI Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/handsontable@12/dist/handsontable.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@12/dist/handsontable.full.min.css" />
    <style>
        :root {
            --bg: #1a1c1e;
            --panel: #25282b;
            --panel-soft: #2f3337;
            --row-bg: #2a2d31;
            --row-border: #4a4e52;
            --header-bg: #1a1c1e;
            --header-text: #ffffff;
            --text: #e0e0e0;
            --text-dim: #9ba1a6;
            --accent: #0091ff;
            --accent-soft: rgba(0, 145, 255, 0.15);
            --success: #32d74b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px 30px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-dim));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 #activeFile {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            margin-left: 12px;
            -webkit-text-fill-color: var(--text-dim);
            vertical-align: middle;
        }

        .top-bar {
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .top-bar.dragover {
            border-color: var(--accent);
            background: rgba(0, 145, 255, 0.1);
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
        }

        .toolbar input[type="file"] {
            display: none;
        }

        .toolbar button {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--panel-soft);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar button.primary {
            background: var(--accent);
            border: none;
            color: white;
        }

        .toolbar button:hover {
            background: #3e444a;
            transform: translateY(-1px);
        }

        .toolbar button.primary:hover {
            background: #33a6ff;
        }

        .sheet-tabs {
            display: flex;
            gap: 4px;
            padding-left: 8px;
        }

        .sheet-tab {
            padding: 8px 18px;
            border-radius: 8px 8px 0 0;
            background: #1f2225;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #333;
            border-bottom: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sheet-tab.active {
            background: var(--panel);
            color: var(--accent);
            border-color: rgba(255, 255, 255, 0.05);
        }

        #hot {
            height: 800px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--bg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* HANDSONTABLE RESET & SYNC */
        .handsontable {
            background: var(--bg) !important;
            color: var(--text) !important;
        }

        .handsontable .wtHolder {
            background: var(--bg) !important;
        }

        /* The Card Gap Logic */
        .handsontable table {
            border-collapse: separate !important;
            border-spacing: 0 10px !important;
            margin: 0 !important;
        }

        /* Center column headers text */
        .handsontable th {
            background: var(--header-bg) !important;
            color: var(--text-dim) !important;
            font-weight: 600 !important;
            font-size: 12px !important;
            border: none !important;
            text-align: center !important;
            vertical-align: middle !important;
            padding: 0 !important;
        }

        .handsontable td {
            background: var(--row-bg) !important;
            color: var(--text) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            border: 1px solid var(--row-border) !important;
            padding: 0 16px !important;
            vertical-align: middle !important;
            transition: background 0.1s ease;
        }

        /* Rounded row edges */
        .handsontable tbody tr td:first-child {
            border-radius: 8px 0 0 8px;
        }

        .handsontable tbody tr td:last-child {
            border-radius: 8px 8px 8px 8px;
            border-radius: 0 8px 8px 0;
        }

        /* Row Header Alignment (Numbers) */
        .handsontable .rowHeader {
            background: transparent !important;
            border: none !important;
            color: var(--text-dim) !important;
            vertical-align: middle !important;
            text-align: center !important;
            font-size: 11px !important;
            padding: 0 !important;
        }

        /* Header Row (Row X) styling - Center text */
        .handsontable tbody tr:first-child td {
            background: var(--panel-soft) !important;
            color: var(--accent) !important;
            font-weight: 700 !important;
            border-color: var(--accent-soft) !important;
            text-align: center !important;
        }

        /* Selection & Hover */
        .handsontable td:hover {
            background: #3e4247 !important;
        }

        .handsontable td.current {
            background: #3e444a !important;
            box-shadow: inset 0 0 0 1.5px var(--accent) !important;
            border-color: var(--accent) !important;
        }

        .handsontable .wtBorder {
            background-color: var(--accent) !important;
            z-index: 10 !important;
        }

        .handsontableInput {
            background: #3e444a !important;
            color: var(--text) !important;
            border: 1px solid var(--accent) !important;
            border-radius: 4px;
        }

        .status {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            background: var(--panel-soft);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .status.success {
            border-left: 4px solid var(--success);
        }

        .status.error {
            border-left: 4px solid #ff453a;
        }

        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1c1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3f44;
            border: 3px solid #1a1c1e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-section">
            <h1>Shima Spreadsheet Editor <span id="activeFile"></span></h1>
            <div id="status" class="status"></div>
        </div>

        <div class="top-bar" id="topBar">
            <div class="toolbar">
                <input id="fileInput" type="file" accept=".xlsx,.xls" />
                <button class="primary" onclick="document.getElementById('fileInput').click()">📁 Open File</button>
                <button onclick="saveToServer()"
                    style="background: var(--accent-strong); border-color: var(--accent);">☁️ Save to Server</button>
                <button onclick="exportXLSX()">💾 Local Export</button>
                <button onclick="addSheet()">➕ New Sheet</button>
                <button onclick="hot.undo()">↶ Undo</button>
                <button onclick="hot.redo()">↷ Redo</button>
                <button onclick="autoLoadFromServer()"
                    style="margin-left: auto; border: 1px solid var(--accent-soft); color: var(--accent);">🔄 Sync from
                    Server</button>
            </div>
        </div>

        <div class="sheet-tabs" id="sheetTabs"></div>
        <div id="hot"></div>
    </div>

    <script>
        let hot;
        let workbook = null;
        let currentSheetIndex = 0;
        let sheetNames = [];
        let currentFileName = "No file loaded";

        function updateFileNameDisplay(name) {
            currentFileName = name;
            document.getElementById("activeFile").textContent = "--- now editing (" + name + ")";
        }

        document.addEventListener("DOMContentLoaded", function () {
            hot = new Handsontable(document.getElementById("hot"), {
                width: "100%",
                height: 800,
                rowHeaders: (index) => index === 0 ? "X" : index - 1,
                rowHeaderWidth: 50,
                colHeaders: true,
                fixedRowsTop: 1,
                manualColumnResize: true,
                manualRowResize: false,
                stretchH: "all",
                colWidths: [100, 120, 120, 400, 200],
                rowHeights: (index) => index === 0 ? 36 : 56,
                licenseKey: "non-commercial-and-evaluation",
                bindRowsWithHeaders: true,
                viewportRowRenderingOffset: 20
            });
            autoLoadFromServer();
        });

        async function autoLoadFromServer() {
            try {
                const response = await fetch("/shima/excel/download?t=" + Date.now());
                if (!response.ok) throw new Error(response.status);
                const arrayBuffer = await response.arrayBuffer();
                loadWorkbookData(new Uint8Array(arrayBuffer));
                updateFileNameDisplay("shima_sheets.xlsx");
                showStatus("Synced with server");
            } catch (err) {
                showStatus("Ready for upload", "success");
            }
        }

        const topBar = document.getElementById("topBar");
        const fileInput = document.getElementById("fileInput");
        fileInput.addEventListener("change", (e) => e.target.files[0] && loadWorkbook(e.target.files[0]));
        topBar.addEventListener("dragover", (e) => { e.preventDefault(); topBar.classList.add("dragover"); });
        topBar.addEventListener("dragleave", () => topBar.classList.remove("dragover"));
        topBar.addEventListener("drop", (e) => {
            e.preventDefault();
            topBar.classList.remove("dragover");
            if (e.dataTransfer.files[0]) loadWorkbook(e.dataTransfer.files[0]);
        });

        function loadWorkbook(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                loadWorkbookData(new Uint8Array(e.target.result));
                updateFileNameDisplay(file.name);
                showStatus("Loaded workbook: " + file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        function loadWorkbookData(data) {
            workbook = XLSX.read(data, { type: "array" });
            sheetNames = workbook.SheetNames || [];
            if (!sheetNames.length) return;
            updateSheetTabs();
            switchToSheet(0);
        }

        function updateSheetTabs() {
            const tabs = document.getElementById("sheetTabs");
            tabs.innerHTML = "";
            sheetNames.forEach((name, idx) => {
                const tab = document.createElement("div");
                tab.textContent = name;
                tab.className = "sheet-tab" + (idx === currentSheetIndex ? " active" : "");
                tab.onclick = () => switchToSheet(idx);
                tabs.appendChild(tab);
            });
        }

        function switchToSheet(index) {
            if (!workbook) return;
            currentSheetIndex = index;
            const sheet = workbook.Sheets[sheetNames[index]];
            const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            const maxCols = rawData.length ? Math.max(...rawData.map(r => Array.isArray(r) ? r.length : 0)) : 0;
            const data = rawData.map(row => {
                const r = Array.isArray(row) ? row.slice() : [];
                while (r.length < maxCols) r.push("");
                return r;
            });
            hot.loadData(data);
            updateSheetTabs();
        }

        function addSheet() {
            if (!workbook) workbook = { SheetNames: [], Sheets: {} };
            const name = "Sheet" + (sheetNames.length + 1);
            workbook.SheetNames.push(name);
            workbook.Sheets[name] = XLSX.utils.aoa_to_sheet([[]]);
            sheetNames = workbook.SheetNames.slice();
            updateSheetTabs();
            switchToSheet(sheetNames.length - 1);
        }

        function exportXLSX() {
            if (!workbook) return;
            workbook.Sheets[sheetNames[currentSheetIndex]] = XLSX.utils.aoa_to_sheet(hot.getData());
            const wbout = XLSX.write(workbook, { bookType: "xlsx", type: "array" });
            const url = URL.createObjectURL(new Blob([wbout], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }));
            const a = document.createElement("a");
            a.href = url;
            a.download = currentFileName.endsWith(".xlsx") ? currentFileName : currentFileName + ".xlsx";
            a.click();
            URL.revokeObjectURL(url);
            showStatus("Exported successfully");
        }

        async function saveToServer() {
            if (!workbook) {
                showStatus("No data to save", "error");
                return;
            }
            try {
                showStatus("Saving to server...");
                // Update the current sheet in the workbook object
                workbook.Sheets[sheetNames[currentSheetIndex]] = XLSX.utils.aoa_to_sheet(hot.getData());

                const wbout = XLSX.write(workbook, { bookType: "xlsx", type: "array" });

                const response = await fetch("/shima/excel/upload", {
                    method: "POST",
                    body: wbout
                });

                if (response.ok) {
                    showStatus("Saved back to server successfully");
                    updateFileNameDisplay("shima_sheets.xlsx"); // We always save back to this on server
                } else {
                    const err = await response.text();
                    throw new Error(err);
                }
            } catch (err) {
                console.error("Save to server failed:", err);
                showStatus("Failed to save to server: " + err.message, "error");
            }
        }

        function showStatus(msg, type = "success") {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.className = "status " + (type === "error" ? "error" : "success");
            el.style.display = "block";
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.style.display = "none", 3000);
        }
    </script>
</body>

</html>
